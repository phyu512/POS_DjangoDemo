{% extends 'webapp/layout.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<p style="color:red">
    DEBUG group param: {{ request.GET.group }}
</p> 
<div class="card">
    <div class="card-header"><h3>{{ title }}</h3></div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-success">{{ button_text }}</button>
            <a href="{% url 'category_list' %}" class="btn btn-secondary">Back</a>
        </form>
    </div>
</div>
{% endblock %}
