{% extends 'webapp/layout.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}

<div class="card">
    <div class="card-header"><h3>{{ title }}</h3></div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-success">{{ button_text }}</button>
            <a href="{% url 'role_list' %}" class="btn btn-secondary">Back</a>
        </form>
    </div>
</div>
{% endblock %}
