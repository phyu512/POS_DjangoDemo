{% extends 'webapp/layout.html' %}

{% block title %}Role List{% endblock %}

{% block content %}
<div class="card shadow-sm">
    <div class="card-header bg-white py-3">
        <h3 class="mb-0 h5 fw-bold">Role List</h3>
    </div>

    <div class="card-body">
        <form method="get" class="mb-4">
            <div class="row g-2">
                <div class="col-12 col-md-4 col-lg-3">
                    <input type="text" name="q" class="form-control" placeholder="Search for role" value="{{ request.GET.q }}">
                </div>
                <div class="col-auto">
                    <button class="btn btn-outline-secondary" type="submit">
                        <i class="fa fa-search"></i> Search
                    </button>
                </div>
                <div class="col-12 col-sm-auto ms-sm-auto">
                    <a href="{% url 'create_role' %}" class="btn btn-primary w-100">
                        <i class="fa fa-plus"></i> New Role
                    </a>
                </div>
            </div>
        </form>

        <div class="table-responsive">
            <table class="table table-bordered table-striped align-middle">
                <thead class="table-light">
                    <tr>
                        <th style="width: 50px;">#</th>
                        <th>Role Name</th>
                        <th class="text-center">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for role in roles %}
                    <tr>
                        <td>{{ forloop.counter }}</td>
                        <td class="fw-bold">{{ role.name }}</td>
                        <td class="text-nowrap">
                            <div class="d-flex justify-content-center gap-1">
                                <a href="{% url 'assign_group_permissions' role.id %}" class="btn btn-sm btn-primary">
                                    <i class="fa fa-key"></i> <span class="d-none d-md-inline">Add permission</span>
                                </a>
                                
                                <a href="{% url 'edit_role' role.id %}" class="btn btn-sm btn-warning">
                                    <i class="fa fa-edit"></i> Edit
                                </a>
                                
                                <form action="{% url 'delete_role' role.id %}" method="POST" class="d-inline m-0">
                                    {% csrf_token %}
                                    <button type="submit" class="btn btn-sm btn-danger"
                                            onclick="return confirm('Are you sure you want to delete this role?');">
                                        <i class="fa fa-trash"></i> Delete
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="3" class="text-center py-4 text-muted">No roles found.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
